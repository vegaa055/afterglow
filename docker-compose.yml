# ─────────────────────────────────────────────────────────────
# Afterglow — Docker Compose
#
# Profiles:
#   (default / no profile)  → production-like: Gunicorn + Uvicorn workers
#   dev                     → Uvicorn with --reload, source mounted live
#
# Usage:
#   Production:  docker compose up --build
#   Dev:         docker compose --profile dev up --build
# ─────────────────────────────────────────────────────────────

services:

  # ── Production service ───────────────────────────────────────
  afterglow:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: afterglow:latest
    container_name: afterglow
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WEB_CONCURRENCY: "2"
      # Suppress Python bytecode writes (cleaner container logs)
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      # Persist the requests-cache SQLite DB across restarts
      - cache-data:/app/.cache
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    profiles: ["", "prod"]   # default profile


  # ── Dev service ──────────────────────────────────────────────
  afterglow-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder         # use the builder stage — has gcc if we ever need it
    image: afterglow:dev
    container_name: afterglow-dev
    ports:
      - "8000:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      # Live-mount the entire app directory — edit locally, reload instantly
      - ./:/app
      - cache-data:/app/.cache
    working_dir: /app
    # Override the production CMD: single Uvicorn worker with --reload
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app
        --log-level debug
    profiles: ["dev"]


volumes:
  cache-data:
    driver: local
