# ─────────────────────────────────────────────────────────────
# Afterglow — Docker Compose
#
# Profiles:
#   (default)  → production-like: Gunicorn + Uvicorn workers
#   dev        → Uvicorn with --reload, source mounted live
#
# Usage:
#   Production:  docker compose up --build
#   Dev:         docker compose --profile dev up --build
# ─────────────────────────────────────────────────────────────

services:

  # ── Production ───────────────────────────────────────────────
  afterglow:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: afterglow:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-2}"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - cache-data:/app/.cache
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    profiles: [ "", "prod" ]

  # ── Dev (live reload) ────────────────────────────────────────
  afterglow-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: afterglow:dev
    ports:
      - "8000:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      # Mount app/ source so edits hot-reload without a rebuild
      - ./app:/app
      - cache-data:/app/.cache
    working_dir: /app
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app
        --log-level debug
    profiles: [ "dev" ]

volumes:
  cache-data:
    driver: local
