# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────
# Afterglow CI
#
# Runs on every push and pull request to main.
# Jobs:
#   lint   → ruff + basic import check
#   test   → pytest (scorer unit tests)
#   build  → docker build smoke-test (no push)
# ─────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Lint ─────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting deps
        run: pip install ruff==0.4.4

      - name: Run ruff
        run: ruff check app/

  # ── Unit tests ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt pytest==8.2.0

      - name: Run tests
        run: pytest app/tests/ -v

  # ── Docker build smoke-test ───────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: false
          tags: afterglow:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max
