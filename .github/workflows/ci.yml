# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────
# Afterglow CI
#
# Runs on every push and pull request to main / develop.
# Jobs:
#   lint         → ruff check on app/
#   test         → pytest app/tests/ with scorer unit tests
#   docker-build → smoke-test the multi-stage Dockerfile (no push)
# ─────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Lint ─────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting deps
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/


  # ── Unit tests ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt pytest

      - name: Run tests
        # PYTHONPATH=app so `from scorer import ...` resolves in test files
        run: PYTHONPATH=app pytest app/tests/ -v


  # ── Docker build smoke-test ───────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: false
          tags: afterglow:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max
